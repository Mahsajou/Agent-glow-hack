<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{name} | Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family={display_font}:wght@400;600;700&family={body_font}:wght@400;500;600&family={mono_font}:wght@400;500&display=swap');
:root {{
  --bg: {bg};
  --surface: {surface};
  --accent: {accent};
  --text: {text_primary};
  --text-muted: {text_secondary};
  --font-display: '{display_font}', sans-serif;
  --font-body: '{body_font}', sans-serif;
  --font-mono: '{mono_font}', monospace;
}}
* {{ margin: 0; padding: 0; box-sizing: border-box; }}
body {{ background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; min-height: 100vh; }}
.container {{ max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }}
nav {{
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  z-index: 100; padding: 0.75rem 0;
}}
nav .container {{ display: flex; align-items: center; justify-content: space-between; }}
.brand {{ display: flex; align-items: center; gap: 0.75rem; font-family: var(--font-mono); font-weight: 600; font-size: 0.95rem; color: var(--text); text-decoration: none; }}
.brand-symbol {{ width: 36px; height: 36px; object-fit: contain; }}
.nav-links {{ display: flex; gap: 1.5rem; }}
.nav-links a {{ color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }}
.nav-links a:hover {{ color: var(--accent); }}
.hero {{
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
  padding: 6rem 0 4rem; position: relative;
}}
.hero-banner {{
  position: absolute; inset: 0; z-index: -1; overflow: hidden;
}}
.hero-banner img {{ width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }}
.hero h1 {{ font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }}
.hero .role {{ color: var(--accent); font-family: var(--font-mono); font-size: 1rem; margin-bottom: 1rem; }}
.hero .tagline {{ color: var(--text-muted); font-size: 1.1rem; max-width: 36ch; }}
section {{ padding: 4rem 0; border-top: 1px solid rgba(255,255,255,0.06); }}
section h2 {{ font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 1.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }}
.about-inner {{ display: grid; grid-template-columns: 1fr; gap: 2rem; }}
@media (min-width: 640px) {{ .about-inner {{ grid-template-columns: 1fr 320px; }} }}
.about-visual img {{ width: 100%; max-width: 400px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }}
.skills-list {{ display: flex; flex-wrap: wrap; gap: 0.5rem; }}
.skills-list span {{ background: var(--surface); padding: 0.35rem 0.75rem; border-radius: 4px; font-size: 0.85rem; font-family: var(--font-mono); }}
.projects-list {{ list-style: none; }}
.projects-list li {{ padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); }}
.projects-list li:last-child {{ border-bottom: none; }}
.contact-links {{ display: flex; flex-wrap: wrap; gap: 1rem; }}
.contact-links a {{ color: var(--accent); text-decoration: none; font-family: var(--font-mono); }}
.contact-links a:hover {{ text-decoration: underline; }}
</style>
</head>
<body>
<nav>
  <div class="container">
    <a href="#" class="brand">
      {symbol_html}
      <span>{brand_name}</span>
    </a>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#skills">Skills</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav>

<header class="hero">
  {banner_html}
  <div class="container">
    <h1>{name}</h1>
    <p class="role">{role}</p>
    <p class="tagline">{tagline}</p>
  </div>
</header>

<section id="about">
  <div class="container">
    <h2>About</h2>
    <div class="about-inner">
      <div>
        <p>{bio}</p>
        {education_html}
      </div>
      {moodboard_html}
    </div>
  </div>
</section>

<section id="projects">
  <div class="container">
    <h2>Projects</h2>
    <ul class="projects-list">
      {projects_html}
    </ul>
  </div>
</section>

<section id="skills">
  <div class="container">
    <h2>Skills</h2>
    <div class="skills-list">
      {skills_html}
    </div>
  </div>
</section>

<section id="contact">
  <div class="container">
    <h2>Contact</h2>
    <div class="contact-links">
      {contact_html}
    </div>
  </div>
</section>
</body>
</html>
